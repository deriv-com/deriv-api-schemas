# TEMPORARY — delete after verifying the GitHub App wiring.
# Runs automatically when this branch is pushed.
name: Test GitHub App tokens

on:
  push:
    branches: [ci/receiver-github-app-token]
  workflow_dispatch:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Which app secrets are visible to deriv-api-schemas?
        env:
          CID_READ: ${{ secrets.CLIENT_ID_GHAPP }}
          PK_READ: ${{ secrets.PRIVATE_KEY_GHAPP }}
          CID_WRITE: ${{ secrets.CLIENT_ID_GHAPP_WRITE }}
          PK_WRITE: ${{ secrets.PRIVATE_KEY_GHAPP_WRITE }}
        run: |
          present() { if [ -n "$1" ]; then echo "present (${#1} chars)"; else echo "MISSING / empty"; fi; }
          echo "CLIENT_ID_GHAPP         : $(present "$CID_READ")"
          echo "PRIVATE_KEY_GHAPP       : $(present "$PK_READ")"
          echo "CLIENT_ID_GHAPP_WRITE   : $(present "$CID_WRITE")"
          echo "PRIVATE_KEY_GHAPP_WRITE : $(present "$PK_WRITE")"

      - name: Mint WRITE token (deriv-api-schemas)
        id: w
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CLIENT_ID_GHAPP_WRITE }}
          private-key: ${{ secrets.PRIVATE_KEY_GHAPP_WRITE }}
          owner: deriv-com
          repositories: deriv-api-schemas

      - name: Verify WRITE access on deriv-api-schemas
        if: steps.w.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.w.outputs.token }}
        run: |
          echo "repo permission flags for WRITE token:"
          gh api repos/deriv-com/deriv-api-schemas --jq '.permissions'
          echo "--- definitive contents:write probe (creates a dangling blob, no ref change) ---"
          if gh api repos/deriv-com/deriv-api-schemas/git/blobs \
               -f content="write-probe" -f encoding="utf-8" --jq '.sha'; then
            echo "RESULT: contents:write CONFIRMED (blob created)"
          else
            echo "RESULT: contents:write DENIED"
          fi

      - name: Mint READ token (deriv-api-v2)
        id: r
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CLIENT_ID_GHAPP }}
          private-key: ${{ secrets.PRIVATE_KEY_GHAPP }}
          owner: deriv-com
          repositories: deriv-api-v2

      - name: Verify READ access on deriv-api-v2 releases
        if: steps.r.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.r.outputs.token }}
        run: |
          echo "deriv-api-v2 releases visible: $(gh api repos/deriv-com/deriv-api-v2/releases --jq 'length')"
