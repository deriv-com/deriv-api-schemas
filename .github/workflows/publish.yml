name: Publish Schema Release

on:
  repository_dispatch:
    types: [schema_release_ready]

permissions: {}

concurrency:
  group: schema-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
    steps:
      # Mint a short-lived installation token from the org GitHub App. Classic
      # PATs are no longer usable as CI secrets — the deriv-com org forbids
      # classic PATs with a lifetime > 3 days. Scoped to only the two repos this
      # job touches: deriv-api-schemas (push + release) and deriv-api-v2 (read
      # the private release asset below). The token is revoked when the job ends.
      # Safe to run before checkout: this action does not write to the workspace.
      - name: Mint GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CLIENT_ID_GHAPP }}
          private-key: ${{ secrets.PRIVATE_KEY_GHAPP }}
          owner: deriv-com
          repositories: |
            deriv-api-v2
            deriv-api-schemas

      # Checkout first so the working directory is the repo. actions/checkout
      # cleans the workspace before checking out, so it MUST run before any step
      # that writes files here (schemas.zip, release_notes.md) — otherwise those
      # files get deleted. See: publish failure on production_v20260608 tag.
      # Use the App token (not GITHUB_TOKEN) so the persisted credential used by
      # `git push` below authenticates as the App. The "PR restrictions" ruleset
      # on master requires PRs; the App must therefore be added as a bypass actor
      # on that ruleset — just as the admin PAT user was granted bypass before —
      # or the push is rejected.
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: master
          token: ${{ steps.app_token.outputs.token }}

      - name: Validate dispatch payload
        env:
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          TAG: ${{ github.event.client_payload.tag }}
          ARTIFACT_NAME: ${{ github.event.client_payload.artifact_name }}
          RELEASE_NOTES: ${{ github.event.client_payload.release_notes }}
          RUN_ID: ${{ github.event.client_payload.run_id }}
          RUN_ATTEMPT: ${{ github.event.client_payload.run_attempt }}
        run: |
          if [ "$SOURCE_REPO" != "deriv-com/deriv-api-v2" ]; then
            echo "ERROR: Unexpected source_repo: '$SOURCE_REPO'" >&2
            exit 1
          fi
          if ! echo "$TAG" | grep -qE '^production_'; then
            echo "ERROR: Tag does not match production_* pattern: '$TAG'" >&2
            exit 1
          fi
          if [ "$ARTIFACT_NAME" != "schemas.zip" ]; then
            echo "ERROR: Unexpected artifact_name: '$ARTIFACT_NAME'" >&2
            exit 1
          fi
          if [ -z "$RELEASE_NOTES" ]; then
            echo "ERROR: release_notes payload is empty." >&2
            exit 1
          fi
          echo "Payload validated. Source: $SOURCE_REPO | Tag: $TAG | Artifact: $ARTIFACT_NAME | Triggered by run: $RUN_ID (attempt $RUN_ATTEMPT)"

      - name: Download schemas.zip from deriv-api-v2 release
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          TAG: ${{ github.event.client_payload.tag }}
          ARTIFACT_NAME: ${{ github.event.client_payload.artifact_name }}
        run: |
          RELEASE_JSON=$(GH_TOKEN="$APP_TOKEN" \
            gh api "repos/$SOURCE_REPO/releases/tags/$TAG")

          ASSET_COUNT=$(echo "$RELEASE_JSON" \
            | jq "[.assets[] | select(.name == \"$ARTIFACT_NAME\")] | length")

          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "ERROR: Asset '$ARTIFACT_NAME' not found in release '$TAG' of '$SOURCE_REPO'." >&2
            exit 1
          fi

          if [ "$ASSET_COUNT" -gt 1 ]; then
            echo "ERROR: Multiple assets named '$ARTIFACT_NAME' found in release '$TAG'." >&2
            exit 1
          fi

          ASSET_URL=$(echo "$RELEASE_JSON" \
            | jq -r ".assets[] | select(.name == \"$ARTIFACT_NAME\") | .url")

          # Accept: application/octet-stream triggers redirect to the actual download URL
          curl -sSfL --retry 3 --max-time 120 \
            -H "Authorization: Bearer $APP_TOKEN" \
            -H "Accept: application/octet-stream" \
            "$ASSET_URL" \
            -o "$ARTIFACT_NAME"

          echo "Downloaded $ARTIFACT_NAME ($(du -sh "$ARTIFACT_NAME" | cut -f1))."

      - name: Validate artifact format and content
        run: |
          if ! file schemas.zip | grep -q 'Zip archive'; then
            echo "ERROR: Downloaded file is not a valid ZIP archive." >&2
            exit 1
          fi

          FILE_COUNT=$(unzip -l schemas.zip | grep -c '\.json$')
          if [ "$FILE_COUNT" -lt 5 ]; then
            echo "ERROR: schemas.zip contains only $FILE_COUNT JSON files — expected many more." >&2
            exit 1
          fi
          echo "schemas.zip contains $FILE_COUNT JSON files — format OK."

      - name: Write release notes from payload
        env:
          RELEASE_NOTES: ${{ github.event.client_payload.release_notes }}
        run: |
          printf '%s' "$RELEASE_NOTES" > release_notes.md

      - name: Update schemas directory
        env:
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          rm -rf schemas/
          mkdir schemas
          unzip -q schemas.zip -d schemas/
          echo "Extracted $(find schemas -type f | wc -l | tr -d ' ') files into schemas/."

      - name: Commit and push schema changes
        id: commit
        env:
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schemas/
          if git diff --cached --quiet; then
            echo "No schema changes to commit."
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update schemas for $TAG"
            git push
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release in deriv-api-schemas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.tag }}
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release '$TAG' already exists — updating notes and replacing asset..."
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file release_notes.md
            gh release upload "$TAG" schemas.zip --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "Creating release '$TAG'..."
            gh release create "$TAG" schemas.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --target "$COMMIT_SHA" \
              --notes-file release_notes.md
          fi
          echo "Release '$TAG' published successfully."

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Schema publish failed for $TAG" \
            --body "The publish workflow failed for tag \`$TAG\`.

          **Run:** $RUN_URL

          Please investigate and re-trigger if needed." \
            --label "bug"
